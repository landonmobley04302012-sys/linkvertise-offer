<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Offer</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const code = urlParams.get('code');

        if (!userId || !code) {
            document.body.innerHTML = '<h2>Error: Missing user ID or code. Please use the link from Discord.</h2>';
        } else {
            // Store the code temporarily (optional, but useful)
            localStorage.setItem('pendingCode', code);
            // Redirect to Linkvertise offer
            window.location.href = 'https://link-center.net/4622724/bsUCFRC0QrKk';
        }
    </script>
</head>
<body>
    <p>Redirecting to offer page...</p>
</body>
</html>
